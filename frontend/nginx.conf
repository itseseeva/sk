server {
    listen 80;
    server_name cherrylust.art www.cherrylust.art;

    # Корневая папка с собранным React приложением (dist)
    root /usr/share/nginx/html;
    index index.html;

    # Основной роутинг для Single Page Application (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических файлов для оптимизации скорости загрузки
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # В будущем здесь можно добавить проксирование запросов на бэкенд (Python/Node):
    # location /api/ {
    #     proxy_pass http://backend:5000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
