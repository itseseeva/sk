server {
    listen 80;
    server_name aviatop.space www.aviatop.space;

    # Перенаправляем весь HTTP трафик на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name aviatop.space www.aviatop.space;

    # Пути к сертификатам, которые сгенерирует Certbot
    ssl_certificate /etc/letsencrypt/live/aviatop.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aviatop.space/privkey.pem;

    # Базовые настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://flight_search_backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
